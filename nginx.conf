# nginx.conf — DocuChat Reverse Proxy & Web Server Configuration
#
# This file dictates the routing layer for the entire application when 
# deployed via Docker. It performs two critical functions:
#
#   1. Static File Serving: Directly serves the frontend CSS, JS, and HTML 
#      assets with aggressive cache-control policies for performance.
#   2. API Reverse Proxy: Routes all dynamic endpoints (/auth, /chat, /upload) 
#      to the internal FastAPI backend container (`backend:8000`). It also 
#      manages body size limits for document uploads and extended timeouts 
#      necessary for long-running AI inference requests.

server {
    listen 80;
    server_name _;

    # ─── Frontend static files ────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index pages/index.html;

    # Serve static assets with long cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve HTML pages
    location / {
        try_files $uri $uri/ /pages/index.html;
    }

    # ─── API reverse proxy ────────────────────────────────────────────────────
    # All backend routes are proxied to the FastAPI container
    location ~ ^/(auth|chat|upload|export|user|health)/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for AI inference calls (can take 2–5s)
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # Allow large file uploads (matches MAX_FILE_SIZE_MB in .env)
        client_max_body_size 50M;
    }

    # ─── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend:8000/health;
    }

    # ─── Error pages ──────────────────────────────────────────────────────────
    error_page 404 /pages/index.html;
}
