<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocuChat — Create Account</title>
  <meta name="description" content="Create a DocuChat account to start chatting with your documents using AI." />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="icon" type="image/png" href="../assets/DocuChat_favicon.png" />
</head>
<body>

<div class="auth-blob blob-1"></div>
<div class="auth-blob blob-2"></div>

<div class="auth-page">
  <div class="auth-card glass-card">

    <div class="auth-logo" style="justify-content: center; text-align: center; width: 100%;">
      <div><span style="color:#ffffff">Docu</span><span style="color:#a3a3a3">Chat</span></div>
    </div>

    <h1 class="auth-title">Create your account</h1>

    <form class="auth-form" id="signupForm" novalidate>

      <div class="form-group">
        <label class="form-label" for="signupName">Full name</label>
        <input
          class="input-field"
          type="text"
          id="signupName"
          placeholder="Ada Lovelace"
          autocomplete="name"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="signupEmail">Email address</label>
        <input
          class="input-field"
          type="email"
          id="signupEmail"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="signupPassword">Password</label>
        <div class="password-wrapper">
          <input
            class="input-field"
            type="password"
            id="signupPassword"
            placeholder="At least 8 characters"
            autocomplete="new-password"
            required
          />
          <button type="button" class="pw-toggle" id="signupPwToggle" title="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="signupConfirm">Confirm password</label>
        <div class="password-wrapper">
          <input
            class="input-field"
            type="password"
            id="signupConfirm"
            placeholder="Repeat your password"
            autocomplete="new-password"
            required
          />
          <button type="button" class="pw-toggle" id="signupConfirmToggle" title="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <p id="formError" style="color:var(--error);font-size:13px;display:none;"></p>

      <button class="btn btn-primary auth-submit" type="submit" id="signupBtn">
        Create Account
      </button>
    </form>

    <p class="auth-link-row">
      Already have an account? <a href="index.html" class="nav-link" data-direction="right">Sign in</a>
    </p>
  </div>
</div>

<script type="module" src="../js/signup.js"></script>

</body>
</html>
