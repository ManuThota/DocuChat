<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocuChat — Sign In</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="icon" type="image/png" href="../assets/DocuChat_favicon.png" />
</head>

<body>

  <div class="auth-blob blob-1"></div>
  <div class="auth-blob blob-2"></div>

  <div class="auth-page">
    <div class="auth-card glass-card">

      <div class="auth-logo" style="justify-content: center; text-align: center; width: 100%;">
        <div><span style="color:#ffffff">Docu</span><span style="color:#a3a3a3">Chat</span></div>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in with your email and password.</p>

      <form class="auth-form" id="loginForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="loginEmail">Email address</label>
          <input class="input-field" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"
            required />
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="password-wrapper">
            <input class="input-field" type="password" id="loginPassword" placeholder="Your password"
              autocomplete="current-password" required />
            <button type="button" class="pw-toggle" id="loginPwToggle" title="Show password">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <div style="text-align: left; margin-top: 4px;">
            <a href="forgot_password.html" class="nav-link" data-direction="left" style="font-size: 13px; color: var(--text-muted); text-decoration: underline;">Forgot password?</a>
          </div>
        </div>

        <p id="formError" style="color:var(--error);font-size:13px;display:none;"></p>

        <button class="btn btn-primary auth-submit" type="submit" id="loginBtn">
          Sign In
        </button>
      </form>

      <p class="auth-link-row">
        New here? <a href="signup.html" class="nav-link" data-direction="left">Create an account</a>
      </p>
    </div>
  </div>

  <script type="module" src="../js/index.js"></script>

</body>

</html>

</body>

</html>
