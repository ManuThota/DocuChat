<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocuChat — Forgot Password</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="icon" type="image/png" href="../assets/DocuChat_favicon.png" />
</head>
<body>

  <div class="auth-blob blob-1"></div>
  <div class="auth-blob blob-2"></div>

  <div class="auth-page">
    <div class="auth-card glass-card" style="position: relative;">
      
      <!-- Back Button -->
      <a href="index.html" class="nav-link" data-direction="right" style="position: absolute; top: 24px; left: 24px; font-size: 14px; text-decoration: underline; color: var(--text-muted);">Back</a>

      <div class="auth-logo" style="justify-content: center; text-align: center; width: 100%; margin-top: 10px;">
        <div><span style="color:#ffffff">Docu</span><span style="color:#a3a3a3">Chat</span></div>
      </div>

      <h1 class="auth-title">Reset password</h1>
      <p class="auth-subtitle">Enter your registered email address to receive an OTP.</p>

      <form class="auth-form" id="forgotForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="forgotEmail">Email address</label>
          <input class="input-field" type="email" id="forgotEmail" placeholder="you@example.com" required />
        </div>

        <p id="formError" style="color:var(--error);font-size:13px;display:none;"></p>
        <p id="formSuccess" style="color:var(--success);font-size:13px;display:none;"></p>

        <button class="btn btn-primary auth-submit" type="submit" id="forgotBtn">
          Send OTP
        </button>
      </form>

    </div>
  </div>

  <script type="module" src="../js/forgot_password.js"></script>

</body>
</html>
