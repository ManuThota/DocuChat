<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocuChat — Change Password</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="icon" type="image/png" href="../assets/DocuChat_favicon.png" />
</head>
<body>

  <div class="auth-blob blob-1"></div>
  <div class="auth-blob blob-2"></div>

  <div class="auth-page">
    <div class="auth-card glass-card" style="position: relative;">
      
      <!-- Back Button -->
      <a href="verify_reset.html" class="nav-link" data-direction="right" style="position: absolute; top: 24px; left: 24px; font-size: 14px; text-decoration: underline; color: var(--text-muted);">Back</a>

      <div class="auth-logo" style="justify-content: center; text-align: center; width: 100%; margin-top: 10px;">
        <div><span style="color:#ffffff">Docu</span><span style="color:#a3a3a3">Chat</span></div>
      </div>

      <h1 class="auth-title">Change password</h1>
      <p class="auth-subtitle">Create a new password for your account.</p>

      <form class="auth-form" id="resetPasswordForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="newPassword">New Password</label>
          <div class="password-wrapper">
            <input class="input-field" type="password" id="newPassword" placeholder="At least 8 characters" required />
            <button type="button" class="pw-toggle" id="newPwToggle" title="Show password">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmNewPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input class="input-field" type="password" id="confirmNewPassword" placeholder="Repeat your password" required />
            <button type="button" class="pw-toggle" id="confirmNewPwToggle" title="Show password">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <p id="formError" style="color:var(--error);font-size:13px;display:none;"></p>

        <button class="btn btn-primary auth-submit" type="submit" id="resetPasswordBtn">
          Change Password
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="../js/reset_password.js"></script>

</body>
</html>
