version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# DocuChat — Docker Compose
#
# Local development:
#   docker-compose up --build
#
# Then open:
#   Frontend → http://localhost:3000/pages/index.html
#   Backend  → http://localhost:8000/docs
#
# Production (swap nginx image for your CDN):
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docuchat_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the absolute container path
      DATABASE_URL: sqlite+aiosqlite:////app/data/docuchat.db
      UPLOAD_DIR: /app/uploads
    volumes:
      # Persist SQLite database across container restarts
      - db_data:/app/data
      # Persist uploaded files and FAISS indexes
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Nginx — Frontend static file server + API reverse proxy ─────────────
  frontend:
    image: nginx:alpine
    container_name: docuchat_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      # Serve the frontend directory
      - ./frontend:/usr/share/nginx/html:ro
      # Custom nginx config (see nginx.conf below)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local
